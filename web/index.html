<!doctype html>
<!--
==============================================================================
Tres Lunas Environmental Monitoring Dashboard
==============================================================================

Purpose
-------
Web dashboard for viewing environmental data collected by a network of
Raspberry Pi Pico W sensor nodes deployed in Playa del Carmen, Mexico.

Features
--------
• Displays current temperature and relative humidity readings
• Retrieves historical data from Adafruit IO via REST API
• Receives live updates via MQTT over WebSockets
• Supports multiple sensor nodes
• Provides configurable time ranges and binning intervals
• Exports charted data to CSV
• Displays diagnostic logs and node status information in tabular form

Data Philosophy
---------------
• Pico-generated timestamps are authoritative.
• Adafruit 'created_at' timestamps are used only for API pagination.
• Historical charts and diagnostics are sorted using embedded timestamps.

Sensor Data Format
------------------
{
    "reading": 23.7,
    "timestamp": "2026-07-15T18:42:31Z"
}

Diagnostic Data Format
----------------------
Diagnostic payloads may contain arbitrary fields, including:

{
    "Type": "status",
    "Timestamp": "...",
    "RSSI": -43,
    "BootCount": 5,
    ...
}

or

{
    "Type": "exception",
    "SubsystemCode": "NTP",
    "Message": "...",
    ...
}

Design Philosophy
-----------------
• Readability over cleverness
• Explicit control flow
• Conservative error handling
• Minimal dependencies
• Long-term unattended operation
• Dynamic handling of diagnostic payload fields

External Dependencies
---------------------
• Tailwind CSS
• Chart.js
• chartjs-adapter-date-fns
• MQTT.js
• Adafruit IO REST API
• Adafruit IO MQTT service

Project
-------
Tres Lunas Climate Network
Firmware Series: v1.x
Author: Radha Venkat

==============================================================================
-->
<html lang="en">
    <head>
        <!--
        This file primarily defines page layout and UI elements.
        Most application logic resides in dashboard.js.
        -->

        <meta charset="UTF-8" />
        <meta name="viewport" content="width=device-width, initial-scale=1.0" />
        <title>TL Dashboard 1.17</title>
        <!-- Tailwind CSS for mobile layouts -->
        <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
        <!-- MQTT.js library -->
        <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
        <!-- Chart.js library for drawing our responsive graphs -->
        <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
        <!-- Chart.js Date Adapter to parse time series strings correctly -->
        <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
        <link rel="icon" href="TL.ico" sizes="any" />
    </head>
    <body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col items-center">
        <!-- 1. CREDENTIALS CONFIGURATION MODAL -->
        <div
            id="config-modal"
            class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
            <div
                class="bg-slate-800 p-6 rounded-2xl w-full max-w-md border border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto">
                <h2 class="text-xl font-bold mb-1">Connect Adafruit IO</h2>
                <p class="text-sm text-slate-400 mb-4">
                    Credentials are saved locally on this device.
                </p>
                <div class="space-y-4">
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                            >IO Username</label
                        >
                        <input
                            id="input-username"
                            type="text"
                            class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white" />
                    </div>
                    <div>
                        <label
                            class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1"
                            >IO API Key</label
                        >
                        <input
                            id="input-key"
                            type="password"
                            class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white" />
                    </div>
                    <button
                        id="save-config-btn"
                        class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg mt-2 transition-all active:scale-[0.98]">
                        Save & Load Dashboard
                    </button>
                </div>
            </div>
        </div>

        <!-- 2. MAIN DASHBOARD INTERFACE -->
        <header class="w-full max-w-md flex justify-between items-center mb-6">
            <div>
                <h1 class="text-xl font-bold tracking-wide">Climate Network</h1>
                <button
                    id="disconnect-btn"
                    class="hidden text-xs text-slate-500 hover:text-rose-400 underline transition-colors cursor-pointer mt-0.5 block">
                    Clear Credentials
                </button>
            </div>
            <div
                id="status"
                class="px-3 py-1 rounded-full text-xs font-semibold bg-amber-500 text-slate-950 transition-all duration-300">
                Initializing...
            </div>
        </header>

        <main class="w-full max-w-md space-y-6 pb-12">
            <!-- Live Numerical Status Cards Group -->
            <section class="grid grid-cols-3 gap-3">
                <div class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center">
                    <span
                        id="label-1"
                        class="text-[10px] font-bold tracking-wider text-slate-400 block uppercase mb-1"
                        >Sensor #1</span
                    >
                    <div class="text-xl font-black text-blue-500">
                        <span id="val-t1">--</span><span class="text-xs font-normal">°F</span>
                    </div>
                    <div class="text-sm font-semibold text-blue-500 mt-0.5">
                        <span id="val-h1">--</span><span class="text-xs font-normal">%</span>
                    </div>
                    <div class="text-[10px] text-slate-500 mt-1" id="time-1">--</div>
                </div>

                <div class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center">
                    <span
                        id="label-2"
                        class="text-[10px] font-bold tracking-wider text-slate-400 block uppercase mb-1"
                        >Sensor #2</span
                    >
                    <div class="text-xl font-black text-teal-500">
                        <span id="val-t2">--</span><span class="text-xs font-normal">°F</span>
                    </div>
                    <div class="text-sm font-semibold text-teal-500 mt-0.5">
                        <span id="val-h2">--</span><span class="text-xs font-normal">%</span>
                    </div>
                    <div class="text-[10px] text-slate-500 mt-1" id="time-2">--</div>
                </div>

                <div class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center">
                    <span
                        id="label-3"
                        class="text-[10px] font-bold tracking-wider text-slate-400 block uppercase mb-1"
                        >Sensor #3</span
                    >
                    <div class="text-xl font-black text-purple-500">
                        <span id="val-t3">--</span><span class="text-xs font-normal">°F</span>
                    </div>
                    <div class="text-sm font-semibold text-purple-500 mt-0.5">
                        <span id="val-h3">--</span><span class="text-xs font-normal">%</span>
                    </div>
                    <div class="text-[10px] text-slate-500 mt-1" id="time-3">--</div>
                </div>
            </section>

            <!-- Temperature Graph -->
            <section class="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700/50">
                <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider mb-2">
                    Temperature
                </h2>
                <div class="h-56 relative w-full"><canvas id="tempChart"></canvas></div>
            </section>

            <!-- Humidity Graph -->
            <section class="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700/50">
                <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider mb-2">
                    Humidity
                </h2>
                <div class="h-56 relative w-full">
                    <canvas id="humidityChart"></canvas>
                </div>
            </section>

            <section class="bg-slate-800 p-3 rounded-xl border border-slate-700/50">
                <div class="grid grid-cols-2 gap-3">
                    <div>
                        <label class="block text-[10px] text-slate-400 uppercase mb-1">
                            Range
                        </label>
                        <select
                            id="range-select"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm">
                            <option value="4">4 hours</option>
                            <option value="24">Day</option>
                            <option value="168" selected>Week</option>
                            <option value="720">Month</option>
                            <option value="8760">Year</option>
                        </select>
                    </div>

                    <div>
                        <label class="block text-[10px] text-slate-400 uppercase mb-1"
                            >Bin size</label
                        >
                        <select
                            id="bin-select"
                            class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm">
                            <option value="5">5 min</option>
                            <option value="30">30 min</option>
                            <option value="60" selected>1 hour</option>
                            <option value="240">4 hours</option>
                            <option value="720">12 hours</option>
                            <option value="1440">1 day</option>
                            <option value="10080">1 week</option>
                        </select>
                    </div>
                </div>
            </section>
            <button
                id="download-csv-btn"
                class="w-full bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-lg p-2 text-sm font-semibold">
                Download CSV
            </button>
            <section
                class="bg-slate-800 p-4 rounded-2xl border border-slate-700/50 w-full lg:w-[calc(100vw-3rem)] lg:max-w-7xl lg:relative lg:left-1/2 lg:-translate-x-1/2">
                <button
                    id="show-status-table-btn"
                    class="w-full text-left text-sm font-semibold text-slate-200">
                    Status History
                </button>

                <div id="status-node-filter" class="hidden flex flex-wrap gap-3 mt-3 text-xs"></div>

                <div id="status-table-container" class="hidden mt-4 overflow-x-auto"></div>
            </section>

            <section
                class="bg-slate-800 p-4 rounded-2xl border border-slate-700/50 w-full lg:w-[calc(100vw-3rem)] lg:max-w-7xl lg:relative lg:left-1/2 lg:-translate-x-1/2">
                <button
                    id="show-log-table-btn"
                    class="w-full text-left text-sm font-semibold text-slate-200">
                    Event Log
                </button>

                <div id="log-table-container" class="hidden mt-4 overflow-x-auto"></div>
            </section>
        </main>
        <script src="dashboard.js"></script>
    </body>
</html>
