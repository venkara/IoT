<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>TL Dashboard 1.12</title>
    <!-- Tailwind CSS for mobile layouts -->
    <script src="https://cdn.jsdelivr.net/npm/@tailwindcss/browser@4"></script>
    <!-- MQTT.js library -->
    <script src="https://unpkg.com/mqtt/dist/mqtt.min.js"></script>
    <!-- Chart.js library for drawing our responsive graphs -->
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <!-- Chart.js Date Adapter to parse time series strings correctly -->
    <script src="https://cdn.jsdelivr.net/npm/chartjs-adapter-date-fns"></script>
    <link rel="icon" href="TL.ico" sizes="any">
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col items-center">

    <!-- 1. CREDENTIALS CONFIGURATION MODAL -->
    <div id="config-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-md border border-slate-700 shadow-2xl max-h-[90vh] overflow-y-auto">
            <h2 class="text-xl font-bold mb-1">Connect Adafruit IO</h2>
            <p class="text-sm text-slate-400 mb-4">Credentials are saved locally on this device.</p>
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">IO Username</label>
                    <input id="input-username" type="text" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">IO API Key</label>
                    <input id="input-key" type="password" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <button id="save-config-btn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg mt-2 transition-all active:scale-[0.98]">
                    Save & Load Dashboard
                </button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN DASHBOARD INTERFACE -->
    <header class="w-full max-w-md flex justify-between items-center mb-6">
        <div>
            <h1 class=" text-xl font-bold tracking-wide">Climate Network</h1>
            <button id="disconnect-btn" class="hidden text-xs text-slate-500 hover:text-rose-400 underline transition-colors cursor-pointer mt-0.5 block">
                Clear Credentials
            </button>
        </div>
        <div id="status" class="px-3 py-1 rounded-full text-xs font-semibold bg-amber-500 text-slate-950 transition-all duration-300">
            Initializing...
        </div>
    </header>

    <main class="w-full max-w-md space-y-6 pb-12">
        <!-- Live Numerical Status Cards Group -->
        <section class="grid grid-cols-3 gap-3">
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center">
                <span class="text-[10px] font-bold tracking-wider text-slate-400 block uppercase mb-1">Sensor #1</span>
                <div class="text-xl font-black text-blue-500"><span id="val-t1">--</span><span class="text-xs font-normal">°F</span></div>
                <div class="text-sm font-semibold text-blue-500 mt-0.5"><span id="val-h1">--</span><span class="text-xs font-normal">%</span></div>
                <div class="text-[10px] text-slate-500 mt-1" id="time-1">--</div>
            </div>
            
        
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center">
                <span class="text-[10px] font-bold tracking-wider text-slate-400 block uppercase mb-1">Sensor #2</span>
                <div class="text-xl font-black text-teal-500"><span id="val-t2">--</span><span class="text-xs font-normal">°F</span></div>
                <div class="text-sm font-semibold text-teal-500 mt-0.5"><span id="val-h2">--</span><span class="text-xs font-normal">%</span></div>
                <div class="text-[10px] text-slate-500 mt-1" id="time-2">--</div>
            </div>
        
            <div class="bg-slate-800 p-3 rounded-xl border border-slate-700/50 text-center">
                <span class="text-[10px] font-bold tracking-wider text-slate-400 block uppercase mb-1">Sensor #3</span>
                <div class="text-xl font-black text-purple-500"><span id="val-t3">--</span><span class="text-xs font-normal">°F</span></div>
                <div class="text-sm font-semibold text-purple-500 mt-0.5"><span id="val-h3">--</span><span class="text-xs font-normal">%</span></div>
                <div class="text-[10px] text-slate-500 mt-1" id="time-3">--</div>
            </div>
        </section>
        
        
        <!-- Temperature Graph -->
        <section class="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700/50">
            <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider mb-2">Temperature</h2>
            <div class="h-56 relative w-full"><canvas id="tempChart"></canvas></div>
        </section>

        <!-- Humidity Graph -->
        <section class="bg-slate-800 p-4 rounded-2xl shadow-xl border border-slate-700/50">
            <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider mb-2">Humidity</h2>
            <div class="h-56 relative w-full"><canvas id="humidityChart"></canvas></div>
        </section>

        
        <section class="bg-slate-800 p-3 rounded-xl border border-slate-700/50">
            <div class="grid grid-cols-2 gap-3">
                <div>
                    <label class="block text-[10px] text-slate-400 uppercase mb-1">
                        Range
                    </label>
                    <select id="range-select"
                        class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm">
                        <option value="4">4 hours</option>
                        <option value="24">Day</option>
                        <option value="168" selected>Week</option>
                        <option value="720">Month</option>
                        <option value="8760">Year</option>
                    </select>
                </div>
        
                <div>
                <label class="block text-[10px] text-slate-400 uppercase mb-1">Bin size</label>
                <select id="bin-select" class="w-full bg-slate-900 border border-slate-700 rounded-lg p-2 text-sm">
                    <option value="5">5 min</option>
                    <option value="30">30 min</option>
                    <option value="60" selected>1 hour</option>
                    <option value="240">4 hours</option>
                    <option value="720">12 hours</option>
                    <option value="1440">1 day</option>
                    <option value="10080">1 week</option>
                </select>
                </div>
            </div>
        </section>
        <button id="download-csv-btn"
            class="w-full bg-slate-700 hover:bg-slate-600 text-slate-100 rounded-lg p-2 text-sm font-semibold">
            Download CSV
        </button>
        
    </main>

    
    <script>
    let client = null;
    let config = {};
    let tempChart = null;
    let humidityChart = null;
    let latestAllData = null;

    /*
     * The Pico publishes raw readings in:
     *   - degrees Celsius
     *   - percent relative humidity
     *
     * Calibration, labels, colors, and unit conversion live here.
     *
     * Replace the placeholder suffix for node 3 when known.
     */
    const NODES = [
        {
            id: "1",
            suffix: "131A17",
            label: "Sensor #1",
            color: "#0e77ff",
            tempOffsetC: 0.0,
            humidityOffset: 0.0
        },
        {
            id: "2",
            suffix: "131A19",
            label: "Sensor #2",
            color: "#14b8a6",
            tempOffsetC: 0.0,
            humidityOffset: 0.0
        },
        {
            id: "3",
            suffix: "131A1B",
            label: "Sensor #3",
            color: "#a855f7",
            tempOffsetC: 0.0,
            humidityOffset: 0.0
        }
    ];

    /*
     * Change this to "C" to display Celsius.
     *
     * The stored and transmitted data remain in Celsius regardless.
     */
    const DISPLAY_TEMPERATURE_UNIT = "F";

    /*
     * These keys correspond to the existing HTML element IDs:
     *
     * val-t1, val-h1
     * val-t2, val-h2
     * val-t3, val-h3
     */
    const SENSOR_KEYS = [
        "t1",
        "h1",
        "t2",
        "h2",
        "t3",
        "h3"
    ];

    const rangeSelect =
        document.getElementById("range-select");

    const binSelect =
        document.getElementById("bin-select");

    const downloadCsvBtn =
        document.getElementById("download-csv-btn");

    const modalEl =
        document.getElementById("config-modal");

    const statusEl =
        document.getElementById("status");

    const saveBtn =
        document.getElementById("save-config-btn");

    const disconnectBtn =
        document.getElementById("disconnect-btn");


    /*
     * ------------------------------------------------------------------
     * NODE AND FEED HELPERS
     * ------------------------------------------------------------------
     */

    function getNode(sensorKey) {
        const nodeId = sensorKey.slice(1);

        return NODES.find(
            node => node.id === nodeId
        );
    }


    function getMeasurementType(sensorKey) {
        return sensorKey.startsWith("t")
            ? "t"
            : "h";
    }


    /*
     * Feed keys inside the tres-lunas Adafruit IO group:
     *
     * 131a17-t
     * 131a17-h
     */
    function getFeedKey(sensorKey) {
        const node = getNode(sensorKey);

        if (!node || !node.suffix) {
            return null;
        }

        const suffix =
            node.suffix.toLowerCase();

        const measurement =
            getMeasurementType(sensorKey);

        return `${suffix}-${measurement}`;
    }


    /*
     * REST path for a feed inside the tres-lunas group.
     */
    function getRestApiPath(sensorKey) {
        const feedKey =
            getFeedKey(sensorKey);

        if (!feedKey) {
            return null;
        }

        return (
            `groups/tres-lunas/feeds/${feedKey}`
        );
    }


    /*
     * Adafruit's MQTT topic uses the composite group.feed key:
     *
     * username/feeds/tres-lunas.131a17-t
     */
    function getMqttTopic(sensorKey) {
        const feedKey =
            getFeedKey(sensorKey);

        if (!feedKey) {
            return null;
        }

        return (
            `${config.username}/feeds/` +
            `tres-lunas.${feedKey}`
        );
    }


    /*
     * ------------------------------------------------------------------
     * SENSOR PAYLOAD PARSING
     * ------------------------------------------------------------------
     */

    /*
     * Expected JSON:
     *
     * {
     *     "reading": 21.4,
     *     "timestamp": "2026-07-13T16:11:47Z"
     * }
     *
     * This function is used for both REST data and live MQTT data.
     */
    function parseSensorPayload(payload) {
        try {
            const record =
                typeof payload === "string"
                    ? JSON.parse(payload)
                    : payload;

            const reading =
                Number(record.reading);

            const timestamp =
                new Date(record.timestamp);

            if (!Number.isFinite(reading)) {
                console.warn(
                    "Invalid sensor reading:",
                    record
                );

                return null;
            }

            if (
                Number.isNaN(
                    timestamp.getTime()
                )
            ) {
                console.warn(
                    "Invalid sensor timestamp:",
                    record
                );

                return null;
            }

            return {
                reading,
                timestamp
            };
        }
        catch (error) {
            console.warn(
                "Unable to parse sensor payload:",
                payload,
                error
            );

            return null;
        }
    }


    /*
     * ------------------------------------------------------------------
     * CALIBRATION AND UNIT CONVERSION
     * ------------------------------------------------------------------
     */

    function convertTemperatureCelsius(
        temperatureC
    ) {
        if (
            DISPLAY_TEMPERATURE_UNIT === "F"
        ) {
            return (
                temperatureC * 9 / 5 + 32
            );
        }

        return temperatureC;
    }


    function getDisplayReading(
        sensorKey,
        rawReading
    ) {
        const node =
            getNode(sensorKey);

        if (!node) {
            return rawReading;
        }

        if (sensorKey.startsWith("t")) {
            const calibratedC =
                rawReading +
                node.tempOffsetC;

            return convertTemperatureCelsius(
                calibratedC
            );
        }

        return (
            rawReading +
            node.humidityOffset
        );
    }


    function getTemperatureUnitLabel() {
        return DISPLAY_TEMPERATURE_UNIT === "F"
            ? "°F"
            : "°C";
    }


    function updateTemperatureUnitLabels() {
        const unitLabel =
            getTemperatureUnitLabel();

        ["t1", "t2", "t3"].forEach(
            sensorKey => {
                const valueElement =
                    document.getElementById(
                        `val-${sensorKey}`
                    );

                /*
                 * The unit span immediately follows
                 * the value span in the current HTML.
                 */
                if (
                    valueElement &&
                    valueElement.nextElementSibling
                ) {
                    valueElement
                        .nextElementSibling
                        .innerText = unitLabel;
                }
            }
        );

        if (tempChart) {
            tempChart.options
                .scales
                .y
                .title
                .text =
                    `Temperature (${unitLabel})`;

            tempChart.update("none");
        }
    }


    /*
     * ------------------------------------------------------------------
     * INITIALIZATION AND CREDENTIALS
     * ------------------------------------------------------------------
     */

    function init() {
        const saved =
            localStorage.getItem(
                "mqtt_dht11_config"
            );

        if (saved) {
            config =
                JSON.parse(saved);

            modalEl.classList.add(
                "hidden"
            );

            disconnectBtn.classList.remove(
                "hidden"
            );

            buildCharts();
            updateTemperatureUnitLabels();
            loadHistoricalData();
        }
        else {
            modalEl.classList.remove(
                "hidden"
            );

            statusEl.innerText =
                "Setup Required";

            statusEl.className =
                "px-3 py-1 rounded-full " +
                "text-xs font-semibold " +
                "bg-slate-700 text-slate-300";
        }
    }


    saveBtn.addEventListener(
        "click",
        () => {
            config = {
                username:
                    document
                        .getElementById(
                            "input-username"
                        )
                        .value
                        .trim(),

                apiKey:
                    document
                        .getElementById(
                            "input-key"
                        )
                        .value
                        .trim()
            };

            if (
                !config.username ||
                !config.apiKey
            ) {
                alert("Missing settings.");
                return;
            }

            localStorage.setItem(
                "mqtt_dht11_config",
                JSON.stringify(config)
            );

            modalEl.classList.add(
                "hidden"
            );

            disconnectBtn.classList.remove(
                "hidden"
            );

            buildCharts();
            updateTemperatureUnitLabels();
            loadHistoricalData();
        }
    );


    disconnectBtn.addEventListener(
        "click",
        () => {
            if (!confirm("Clear settings?")) {
                return;
            }

            localStorage.removeItem(
                "mqtt_dht11_config"
            );

            if (client) {
                client.end(true);
                client = null;
            }

            if (tempChart) {
                tempChart.destroy();
                tempChart = null;
            }

            if (humidityChart) {
                humidityChart.destroy();
                humidityChart = null;
            }

            latestAllData = null;

            SENSOR_KEYS.forEach(
                sensorKey => {
                    const element =
                        document.getElementById(
                            `val-${sensorKey}`
                        );

                    if (element) {
                        element.innerText = "--";
                    }
                }
            );

            NODES.forEach(
                node => {
                    const timeElement =
                        document.getElementById(
                            `time-${node.id}`
                        );

                    if (timeElement) {
                        timeElement.innerText =
                            "--";
                    }
                }
            );

            init();
        }
    );


    /*
     * ------------------------------------------------------------------
     * CHART CREATION
     * ------------------------------------------------------------------
     */

    function chartOptions(yAxisTitle) {
        return {
            responsive: true,
            maintainAspectRatio: false,
            parsing: false,

            scales: {
                x: {
                    type: "time",

                    time: {
                        unit: "hour"
                    },

                    grid: {
                        color: "#334155"
                    },

                    ticks: {
                        color: "#94a3b8"
                    }
                },

                y: {
                    title: {
                        display: true,
                        text: yAxisTitle,
                        color: "#94a3b8"
                    },

                    grid: {
                        color: "#334155"
                    },

                    ticks: {
                        color: "#94a3b8"
                    }
                }
            },

            plugins: {
                legend: {
                    labels: {
                        color: "#f8fafc",

                        font: {
                            size: 10
                        }
                    }
                }
            },

            elements: {
                point: {
                    radius: 1,
                    hoverRadius: 4
                },

                line: {
                    borderWidth: 2
                }
            }
        };
    }


    function buildCharts() {
        if (tempChart) {
            tempChart.destroy();
        }

        if (humidityChart) {
            humidityChart.destroy();
        }

        tempChart = new Chart(
            document.getElementById(
                "tempChart"
            ),
            {
                type: "line",

                data: {
                    datasets:
                        NODES.map(
                            node => ({
                                label:
                                    node.label,

                                data: [],

                                borderColor:
                                    node.color,

                                backgroundColor:
                                    `${node.color}22`
                            })
                        )
                },

                options: chartOptions(
                    `Temperature (` +
                    `${getTemperatureUnitLabel()})`
                )
            }
        );


        humidityChart = new Chart(
            document.getElementById(
                "humidityChart"
            ),
            {
                type: "line",

                data: {
                    datasets:
                        NODES.map(
                            node => ({
                                label:
                                    node.label,

                                data: [],

                                borderColor:
                                    node.color,

                                backgroundColor:
                                    `${node.color}22`
                            })
                        )
                },

                options: chartOptions(
                    "Relative humidity (%)"
                )
            }
        );
    }


    /*
     * ------------------------------------------------------------------
     * HISTORICAL DATA
     * ------------------------------------------------------------------
     */

    async function loadHistoricalData() {
        statusEl.innerText =
            "Loading history...";

        try {
            const hours =
                Number.parseInt(
                    rangeSelect.value,
                    10
                );

            /*
             * Approximate expected record count.
             * Current production interval may differ.
             */
            const targetCount =
                Math.ceil(
                    hours * 60 / 5
                ) + 100;

            const requests =
                SENSOR_KEYS.map(
                    sensorKey => {
                        const apiPath =
                            getRestApiPath(
                                sensorKey
                            );

                        /*
                         * A node with no configured suffix
                         * simply contributes an empty dataset.
                         */
                        if (!apiPath) {
                            return Promise.resolve(
                                []
                            );
                        }

                        return fetchFeedData(
                            apiPath,
                            hours,
                            targetCount
                        );
                    }
                );

            const allData =
                await Promise.all(requests);

            latestAllData = allData;

            updateChartsFromData(allData);
            updateCurrentCards(allData);
            connectLiveMqtt();
        }
        catch (error) {
            console.error(
                "Historical data error:",
                error
            );

            statusEl.innerText =
                "API Error";

            statusEl.className =
                "px-3 py-1 rounded-full " +
                "text-xs font-semibold " +
                "bg-rose-600 text-white";
        }
    }


    async function fetchFeedData(
        apiPath,
        hours = 168,
        targetCount = 2500
    ) {
        let allPoints = [];
        let endTime = null;

        while (
            allPoints.length <
            targetCount
        ) {
            let url =
                `https://io.adafruit.com/` +
                `api/v2/${config.username}/` +
                `${apiPath}/data?limit=1000`;

            if (endTime) {
                url +=
                    `&end_time=` +
                    encodeURIComponent(
                        endTime
                    );
            }
            else {
                url +=
                    `&hours=${hours}`;
            }

            const response =
                await fetch(
                    url,
                    {
                        headers: {
                            "X-AIO-Key":
                                config.apiKey
                        }
                    }
                );

            /*
             * Missing feeds should not prevent
             * the rest of the dashboard loading.
             */
            if (response.status === 404) {
                console.warn(
                    "Feed not found:",
                    apiPath
                );

                return [];
            }

            if (!response.ok) {
                throw new Error(
                    `${apiPath}: HTTP ` +
                    `${response.status}`
                );
            }

            const page =
                await response.json();

            if (
                !Array.isArray(page) ||
                page.length === 0
            ) {
                break;
            }

            allPoints =
                allPoints.concat(page);

            if (page.length < 1000) {
                break;
            }

            /*
             * Keep using Adafruit's created_at
             * timestamp for API pagination.
             *
             * The embedded Pico timestamp is used
             * for plotting and display.
             */
            const oldestPoint =
                page[page.length - 1];

            const oldestMs =
                new Date(
                    oldestPoint.created_at
                ).getTime();

            endTime =
                new Date(
                    oldestMs - 1000
                ).toISOString();
        }

        return allPoints;
    }


    /*
     * ------------------------------------------------------------------
     * CHART DATA PARSING AND BINNING
     * ------------------------------------------------------------------
     */

    function parseChartData(
        singleFeedArray,
        sensorKey,
        binMinutes = 60
    ) {
        if (
            !Array.isArray(
                singleFeedArray
            )
        ) {
            return [];
        }

        const rangeHours =
            Number.parseInt(
                rangeSelect.value,
                10
            );

        const cutoffMs =
            Date.now() -
            rangeHours *
            60 *
            60 *
            1000;

        const binMs =
            binMinutes *
            60 *
            1000;

        const bins =
            new Map();


        singleFeedArray.forEach(
            item => {
                const record =
                    parseSensorPayload(
                        item.value
                    );

                if (!record) {
                    return;
                }

                const timestampMs =
                    record
                        .timestamp
                        .getTime();

                if (
                    timestampMs <
                    cutoffMs
                ) {
                    return;
                }

                const reading =
                    getDisplayReading(
                        sensorKey,
                        record.reading
                    );

                if (
                    !Number.isFinite(
                        reading
                    )
                ) {
                    return;
                }

                const binStart =
                    Math.floor(
                        timestampMs /
                        binMs
                    ) * binMs;

                if (
                    !bins.has(
                        binStart
                    )
                ) {
                    bins.set(
                        binStart,
                        {
                            sum: 0,
                            count: 0
                        }
                    );
                }

                const bin =
                    bins.get(binStart);

                bin.sum += reading;
                bin.count += 1;
            }
        );


        return Array
            .from(
                bins.entries()
            )
            .map(
                ([binStart, bin]) => ({
                    x:
                        new Date(
                            Number(binStart)
                        ),

                    y:
                        bin.sum /
                        bin.count
                })
            )
            .sort(
                (a, b) =>
                    a.x - b.x
            );
    }


    function updateChartsFromData(
        allData
    ) {
        applyTimeScale();

        const binMinutes =
            Number.parseInt(
                binSelect.value,
                10
            );

        tempChart
            .data
            .datasets[0]
            .data =
                parseChartData(
                    allData[0],
                    "t1",
                    binMinutes
                );

        tempChart
            .data
            .datasets[1]
            .data =
                parseChartData(
                    allData[2],
                    "t2",
                    binMinutes
                );

        tempChart
            .data
            .datasets[2]
            .data =
                parseChartData(
                    allData[4],
                    "t3",
                    binMinutes
                );


        humidityChart
            .data
            .datasets[0]
            .data =
                parseChartData(
                    allData[1],
                    "h1",
                    binMinutes
                );

        humidityChart
            .data
            .datasets[1]
            .data =
                parseChartData(
                    allData[3],
                    "h2",
                    binMinutes
                );

        humidityChart
            .data
            .datasets[2]
            .data =
                parseChartData(
                    allData[5],
                    "h3",
                    binMinutes
                );


        tempChart.update();
        humidityChart.update();
    }


    /*
     * ------------------------------------------------------------------
     * CURRENT VALUE CARDS
     * ------------------------------------------------------------------
     */

    function getLatestValidRecord(
        feedPoints
    ) {
        if (
            !Array.isArray(
                feedPoints
            )
        ) {
            return null;
        }

        for (
            const item of feedPoints
        ) {
            const record =
                parseSensorPayload(
                    item.value
                );

            if (record) {
                return record;
            }
        }

        return null;
    }


    function updateCurrentCards(
        allData
    ) {
        SENSOR_KEYS.forEach(
            (
                sensorKey,
                index
            ) => {
                const record =
                    getLatestValidRecord(
                        allData[index]
                    );

                if (!record) {
                    return;
                }

                const displayReading =
                    getDisplayReading(
                        sensorKey,
                        record.reading
                    );

                const valueElement =
                    document.getElementById(
                        `val-${sensorKey}`
                    );

                if (valueElement) {
                    valueElement.innerText =
                        displayReading
                            .toFixed(1);
                }

                const nodeId =
                    sensorKey.slice(1);

                const timeElement =
                    document.getElementById(
                        `time-${nodeId}`
                    );

                if (timeElement) {
                    timeElement.innerText =
                        record
                            .timestamp
                            .toLocaleTimeString(
                                [],
                                {
                                    hour:
                                        "2-digit",

                                    minute:
                                        "2-digit"
                                }
                            );
                }
            }
        );
    }


    /*
     * ------------------------------------------------------------------
     * X-AXIS RANGE
     * ------------------------------------------------------------------
     */

    function applyTimeScale() {
        const hours =
            Number.parseInt(
                rangeSelect.value,
                10
            );

        const now =
            Date.now();

        const minTime =
            now -
            hours *
            60 *
            60 *
            1000;

        let unit =
            "hour";

        let stepSize =
            1;

        if (hours <= 4) {
            unit = "minute";
            stepSize = 30;
        }
        else if (hours <= 24) {
            unit = "hour";
            stepSize = 3;
        }
        else if (hours <= 168) {
            unit = "day";
            stepSize = 1;
        }
        else if (hours <= 720) {
            unit = "week";
            stepSize = 1;
        }
        else {
            unit = "month";
            stepSize = 1;
        }

        [
            tempChart,
            humidityChart
        ].forEach(
            chart => {
                chart.options
                    .scales
                    .x
                    .min = minTime;

                chart.options
                    .scales
                    .x
                    .max = now;

                chart.options
                    .scales
                    .x
                    .time
                    .unit = unit;

                chart.options
                    .scales
                    .x
                    .time
                    .stepSize =
                        stepSize;
            }
        );
    }


    /*
     * ------------------------------------------------------------------
     * LIVE MQTT
     * ------------------------------------------------------------------
     */

    function connectLiveMqtt() {
        /*
         * Avoid creating another MQTT client
         * each time the historical range changes.
         */
        if (client) {
            return;
        }

        statusEl.innerText =
            "Connecting live...";

        statusEl.className =
            "px-3 py-1 rounded-full " +
            "text-xs font-semibold " +
            "bg-amber-500 text-slate-950";


        const brokerUrl =
            "wss://io.adafruit.com/mqtt";

        const options = {
            username:
                config.username,

            password:
                config.apiKey,

            clientId:
                "tl_web_" +
                Math.random()
                    .toString(16)
                    .slice(2, 10)
        };


        client =
            mqtt.connect(
                brokerUrl,
                options
            );


        const topicMap = {};

        const topics =
            SENSOR_KEYS
                .map(
                    sensorKey => {
                        const topic =
                            getMqttTopic(
                                sensorKey
                            );

                        if (!topic) {
                            return null;
                        }

                        topicMap[topic] =
                            sensorKey;

                        return topic;
                    }
                )
                .filter(
                    topic =>
                        topic !== null
                );


        client.on(
            "connect",
            () => {
                statusEl.innerText =
                    "Live Connected";

                statusEl.className =
                    "px-3 py-1 rounded-full " +
                    "text-xs font-semibold " +
                    "bg-emerald-500 " +
                    "text-slate-950";

                client.subscribe(
                    topics,
                    error => {
                        if (error) {
                            console.error(
                                "MQTT subscribe error:",
                                error
                            );
                        }
                    }
                );
            }
        );


        client.on(
            "close",
            () => {
                statusEl.innerText =
                    "Live Offline";

                statusEl.className =
                    "px-3 py-1 rounded-full " +
                    "text-xs font-semibold " +
                    "bg-rose-500 " +
                    "text-slate-100";
            }
        );


        client.on(
            "error",
            error => {
                console.error(
                    "MQTT client error:",
                    error
                );
            }
        );


        client.on(
            "message",
            (
                topic,
                message
            ) => {
                const sensorKey =
                    topicMap[topic];

                if (!sensorKey) {
                    return;
                }

                const payloadText =
                    message.toString();

                const record =
                    parseSensorPayload(
                        payloadText
                    );

                if (!record) {
                    return;
                }

                /*
                 * Add the live message to the same
                 * arrays used by the historical data.
                 *
                 * This keeps chart binning and
                 * calibration consistent.
                 */
                if (latestAllData) {
                    const dataIndex =
                        SENSOR_KEYS.indexOf(
                            sensorKey
                        );

                    if (
                        dataIndex >= 0
                    ) {
                        latestAllData[
                            dataIndex
                        ].unshift({
                            value:
                                payloadText
                        });

                        /*
                         * Prevent unbounded browser
                         * memory growth during long use.
                         */
                        if (
                            latestAllData[
                                dataIndex
                            ].length >
                            10000
                        ) {
                            latestAllData[
                                dataIndex
                            ].length =
                                10000;
                        }
                    }

                    updateChartsFromData(
                        latestAllData
                    );

                    updateCurrentCards(
                        latestAllData
                    );
                }
            }
        );
    }


    /*
     * ------------------------------------------------------------------
     * CSV EXPORT
     * ------------------------------------------------------------------
     */

    function downloadCurrentChartData() {
        const table =
            new Map();


        function addDataset(
            chart,
            columnName,
            datasetIndex
        ) {
            chart
                .data
                .datasets[
                    datasetIndex
                ]
                .data
                .forEach(
                    point => {
                        const timestampMs =
                            point
                                .x
                                .getTime();

                        if (
                            !table.has(
                                timestampMs
                            )
                        ) {
                            table.set(
                                timestampMs,
                                {
                                    Timestamp:
                                        formatTimestamp(
                                            point.x
                                        ),

                                    Temp1: "",
                                    Temp2: "",
                                    Temp3: "",

                                    Humidity1: "",
                                    Humidity2: "",
                                    Humidity3: ""
                                }
                            );
                        }

                        table
                            .get(
                                timestampMs
                            )[
                                columnName
                            ] =
                                point.y;
                    }
                );
        }


        addDataset(
            tempChart,
            "Temp1",
            0
        );

        addDataset(
            tempChart,
            "Temp2",
            1
        );

        addDataset(
            tempChart,
            "Temp3",
            2
        );

        addDataset(
            humidityChart,
            "Humidity1",
            0
        );

        addDataset(
            humidityChart,
            "Humidity2",
            1
        );

        addDataset(
            humidityChart,
            "Humidity3",
            2
        );


        const rows = [
            [
                "Timestamp",

                `Temp1_` +
                DISPLAY_TEMPERATURE_UNIT,

                `Temp2_` +
                DISPLAY_TEMPERATURE_UNIT,

                `Temp3_` +
                DISPLAY_TEMPERATURE_UNIT,

                "Humidity1",
                "Humidity2",
                "Humidity3"
            ]
        ];


        Array
            .from(
                table.keys()
            )
            .sort(
                (a, b) =>
                    a - b
            )
            .forEach(
                timestampMs => {
                    const row =
                        table.get(
                            timestampMs
                        );

                    rows.push([
                        row.Timestamp,
                        row.Temp1,
                        row.Temp2,
                        row.Temp3,
                        row.Humidity1,
                        row.Humidity2,
                        row.Humidity3
                    ]);
                }
            );


        const csv =
            rows
                .map(
                    row =>
                        row
                            .map(
                                csvEscape
                            )
                            .join(",")
                )
                .join("\n");


        const blob =
            new Blob(
                [csv],
                {
                    type:
                        "text/csv"
                }
            );

        const url =
            URL.createObjectURL(
                blob
            );

        const link =
            document.createElement(
                "a"
            );

        link.href = url;

        link.download =
            `tres-lunas-` +
            `${new Date()
                .toISOString()
                .slice(0, 10)}.csv`;

        link.click();

        URL.revokeObjectURL(
            url
        );
    }


    function csvEscape(value) {
        const text =
            String(value);

        if (
            text.includes(",") ||
            text.includes('"') ||
            text.includes("\n")
        ) {
            return (
                `"${text.replaceAll(
                    '"',
                    '""'
                )}"`
            );
        }

        return text;
    }


    function formatTimestamp(date) {
        const pad =
            number =>
                String(number)
                    .padStart(
                        2,
                        "0"
                    );

        return (
            `${date.getFullYear()}-` +
            `${pad(
                date.getMonth() + 1
            )}-` +
            `${pad(
                date.getDate()
            )} ` +
            `${pad(
                date.getHours()
            )}:` +
            `${pad(
                date.getMinutes()
            )}:` +
            `${pad(
                date.getSeconds()
            )}`
        );
    }


    /*
     * ------------------------------------------------------------------
     * EVENT HANDLERS
     * ------------------------------------------------------------------
     */

    rangeSelect.addEventListener(
        "change",
        loadHistoricalData
    );


    binSelect.addEventListener(
        "change",
        () => {
            if (latestAllData) {
                updateChartsFromData(
                    latestAllData
                );
            }
        }
    );


    downloadCsvBtn.addEventListener(
        "click",
        downloadCurrentChartData
    );


    init();


</script>
