<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Secure Mobile MQTT Dashboard</title>
    <!-- Tailwind CSS for styling -->
    <script src="https://jsdelivr.net"></script>
    <!-- MQTT.js library -->
    <script src="https://unpkg.com"></script>
</head>
<body class="bg-slate-900 text-slate-100 font-sans min-h-screen p-4 flex flex-col items-center">

    <!-- 1. CREDENTIALS CONFIGURATION MODAL (Hidden by default) -->
    <div id="config-modal" class="hidden fixed inset-0 bg-slate-950/80 backdrop-blur-md z-50 flex items-center justify-center p-4">
        <div class="bg-slate-800 p-6 rounded-2xl w-full max-w-md border border-slate-700 shadow-2xl">
            <h2 class="text-xl font-bold mb-1">Connect Adafruit IO</h2>
            <p class="text-sm text-slate-400 mb-4">Credentials are saved locally on this device only.</p>
            
            <div class="space-y-4">
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">IO Username</label>
                    <input id="input-username" type="text" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">IO API Key (Active Key)</label>
                    <input id="input-key" type="password" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Temperature Feed Key</label>
                    <input id="input-temp-feed" type="text" value="temperature" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <div>
                    <label class="block text-xs font-semibold text-slate-400 uppercase tracking-wider mb-1">Relay Feed Key</label>
                    <input id="input-relay-feed" type="text" value="relay" class="w-full p-3 bg-slate-900 border border-slate-700 rounded-xl focus:outline-none focus:border-indigo-500 text-white">
                </div>
                <button id="save-config-btn" class="w-full py-4 bg-indigo-600 hover:bg-indigo-500 text-white font-bold rounded-xl shadow-lg mt-2 transition-all active:scale-[0.98]">
                    Save & Connect
                </button>
            </div>
        </div>
    </div>

    <!-- 2. MAIN DASHBOARD INTERFACE -->
    <header class="w-full max-w-md flex justify-between items-center mb-6">
        <div>
            <h1 class="text-xl font-bold tracking-wide">My IoT Node</h1>
            <button id="disconnect-btn" class="text-xs text-slate-500 hover:text-rose-400 underline transition-colors cursor-pointer mt-0.5 block">
                Clear Credentials
            </button>
        </div>
        <div id="status" class="px-3 py-1 rounded-full text-xs font-semibold bg-amber-500 text-slate-950 transition-all duration-300">
            Initializing...
        </div>
    </header>

    <main class="w-full max-w-md space-y-4">
        <!-- Sensor Card -->
        <section class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700/50 flex flex-col justify-between">
            <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider">Temperature</h2>
            <div class="flex items-baseline mt-2">
                <span id="temp-value" class="text-5xl font-black text-emerald-400">--</span>
                <span class="text-xl ml-1 text-slate-400">°C</span>
            </div>
        </section>

        <!-- Toggle Switch Card -->
        <section class="bg-slate-800 p-5 rounded-2xl shadow-xl border border-slate-700/50">
            <h2 class="text-sm font-medium text-slate-400 uppercase tracking-wider mb-3">Relay Control</h2>
            <button id="toggle-btn" class="w-full py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition-all font-bold text-center tracking-wide shadow-lg shadow-indigo-600/20">
                Turn On
            </button>
        </section>
    </main>

    <script>
        let client = null;
        let relayState = "OFF";
        let config = {};

        // DOM elements
        const modalEl = document.getElementById('config-modal');
        const statusEl = document.getElementById('status');
        const tempEl = document.getElementById('temp-value');
        const toggleBtn = document.getElementById('toggle-btn');
        const saveBtn = document.getElementById('save-config-btn');
        const disconnectBtn = document.getElementById('disconnect-btn');

        // Check if configuration exists inside browser storage
        function init() {
            const savedConfig = localStorage.getItem('mqtt_dash_config');
            if (savedConfig) {
                config = JSON.parse(savedConfig);
                modalEl.classList.add('hidden');
                connectMQTT();
            } else {
                modalEl.classList.remove('hidden');
                statusEl.innerText = "Setup Required";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-semibold bg-slate-700 text-slate-300";
            }
        }

        // Save input values to LocalStorage
        saveBtn.addEventListener('click', () => {
            const username = document.getElementById('input-username').value.trim();
            const apiKey = document.getElementById('input-key').value.trim();
            const tempFeed = document.getElementById('input-temp-feed').value.trim();
            const relayFeed = document.getElementById('input-relay-feed').value.trim();

            if (!username || !apiKey || !tempFeed || !relayFeed) {
                alert("Please fill out all configuration blocks.");
                return;
            }

            config = { username, apiKey, tempFeed, relayFeed };
            localStorage.setItem('mqtt_dash_config', JSON.stringify(config));
            modalEl.classList.add('hidden');
            connectMQTT();
        });

        // Clear stored data to disconnect or switch accounts
        disconnectBtn.addEventListener('click', () => {
            if (confirm("Clear saved credentials from this device?")) {
                localStorage.removeItem('mqtt_dash_config');
                if (client) client.end();
                tempEl.innerText = "--";
                relayState = "OFF";
                updateButtonUI();
                init();
            }
        });

        // Initialize connection protocol
        function connectMQTT() {
            statusEl.innerText = "Connecting...";
            statusEl.className = "px-3 py-1 rounded-full text-xs font-semibold bg-amber-500 text-slate-950";

            const tempTopic = `${config.username}/feeds/${config.tempFeed}`;
            const relayTopic = `${config.username}/feeds/${config.relayFeed}`;

            client = mqtt.connect(`wss://://adafruit.com`, {
                username: config.username,
                password: config.apiKey,
                clientId: 'mob_dash_' + Math.random().toString(16).substr(2, 6)
            });

            client.on('connect', () => {
                statusEl.innerText = "Connected";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-semibold bg-emerald-500 text-slate-950";
                
                client.subscribe([tempTopic, relayTopic]);
            });

            client.on('close', () => {
                statusEl.innerText = "Offline";
                statusEl.className = "px-3 py-1 rounded-full text-xs font-semibold bg-rose-500 text-slate-100";
            });

            client.on('message', (topic, message) => {
                const payload = message.toString();
                if (topic === tempTopic) {
                    tempEl.innerText = payload;
                } else if (topic === relayTopic) {
                    relayState = payload.toUpperCase();
                    updateButtonUI();
                }
            });
        }

        // Click handler to publish state back out
        toggleBtn.addEventListener('click', () => {
            if (!client || !client.connected) return;
            const nextState = (relayState === "ON") ? "OFF" : "ON";
            const relayTopic = `${config.username}/feeds/${config.relayFeed}`;
            client.publish(relayTopic, nextState, { qos: 0, retain: false });
        });

        function updateButtonUI() {
            if (relayState === "ON") {
                toggleBtn.innerText = "Turn Off";
                toggleBtn.className = "w-full py-4 rounded-xl bg-rose-600 hover:bg-rose-500 active:scale-[0.98] transition-all font-bold text-center tracking-wide shadow-lg shadow-rose-600/20";
            } else {
                toggleBtn.innerText = "Turn On";
                toggleBtn.className = "w-full py-4 rounded-xl bg-indigo-600 hover:bg-indigo-500 active:scale-[0.98] transition-all font-bold text-center tracking-wide shadow-lg shadow-indigo-600/20";
            }
        }

        // Bootstrap on page load
        init();
    </script>
</body>
</html>
